name: Dependancy scan
on:
    workflow_call:
jobs:
    dependancy-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v7
            
            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                go-version: 1.22
            - name: Install Govulncheck
              run: go install golang.org/x/vuln/cmd/govulncheck@1.3.0

            - name: Run Govulncheck
              run: govulncheck ./...
              working-directory: backend

            - name : Setup NodeJs
              uses: actions/setup-node@v6
              with:
                node-version: '20'
                cache: npm
                cache-dependency-path: frontend/package-lock.json

            - name: Install npm Packages
              run: npm install
              working-directory: frontend

            - name: Run Npm Audit
              run: npm audit
              working-directory: frontend
