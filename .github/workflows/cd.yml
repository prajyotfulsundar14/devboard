# Goal -  Once successfully ci workflow passes, I have to deploy the application to production environment

name: CD
on:
    workflow_run:
        workflows: ["CI"]
        types: [completed]
        branches: [advanced]
jobs:
    deploy:
        if: github.event.workflow_run.conclusion == 'success'
        runs-on: self-hosted
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Copy Example env file to env file
              run: cp .env.example .env
            
            - name: Docker Setup [Login]
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
            
            - name: Deploy the container to Docker Compose
              run: |
                docker compose pull
                docker compose up -d