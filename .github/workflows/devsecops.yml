# Goal - To Run End to End DevSecOps CI Pipeline

name: DevSecOps

on:
    push:
        branches: [master]

jobs:

    # Code Stage (with Shift left)
    code-quality:
        uses: ./.github/workflows/code-quality.yml

    # Secret Scanning
    secret-scanning:
        uses: ./.github/workflows/secret-scanning.yml

    # dependency checking
    dependency-scan:
        uses: ./.github/workflows/dependancy-scan.yml

    # Container Scanning
    docker-scans:
        uses: ./.github/workflows/docker-scans.yml